name: typedlogic QC

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11" ]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install SWI-Prolog (WellFoundedSolver swi backend)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends swi-prolog-nox

      - name: Check common spelling errors
        run: uv run codespell src/ tests/ -S tests/input/,tests/output/

      - name: Test with pytest and generate coverage file
        run: uv run pytest -v --durations=10
